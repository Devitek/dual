<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="screens.css"></head>
<body>
  <div class="viewfinder"></div>
  <div class="scene"></div>

  <div class="topbar">
    <div class="modepill"><span class="dot"></span>DUAL</div>
    <div class="actions">
      <div class="iconbtn"><svg viewBox="0 0 24 24"><path d="M7 2h9l-2 7h4L9 22l2-9H6z"/></svg></div>
      <div class="iconbtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg></div>
    </div>
  </div>

  <div class="pip">
    <div class="face"></div>
    <div class="swap">⇆</div>
  </div>

  <div class="bottom">
    <div class="zoombar"><div class="zoom on">1×</div><div class="zoom">2×</div></div>
    <div class="modeswitch"><div class="seg on">PHOTO</div><div class="seg">VIDEO</div></div>
    <div class="caprow">
      <div class="thumb"><div class="badge">PiP</div></div>
      <div class="shutter"><div class="fill"></div></div>
      <div class="swapbtn"><svg viewBox="0 0 24 24"><path d="M4 7h3l2-2h6l2 2h3v12H4z"/><circle cx="12" cy="13" r="3.4"/><path d="M9 10l-2 2 2 2M15 10l2 2-2 2" stroke-width="1.6"/></svg></div>
    </div>
  </div>
</body></html>
