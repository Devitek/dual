name: Android Build

# Build APK Android (CNG : prebuild + Gradle). Auto-suffisant, sans service
# externe. Déclenché à la publication d'une release (par release-please) et
# manuellement. L'APK est publié en artefact et attaché à la release.
#
# NB : build de TEST (signature debug). Pour un AAB signé Play Store, ajouter un
# keystore en secrets + `bundleRelease`, ou basculer sur EAS Build.

# NB : release-please crée la release avec le GITHUB_TOKEN par défaut, ce qui
# n'enclenche PAS l'event `release` (anti-récursion GitHub). Après une release,
# lancer ce workflow manuellement (workflow_dispatch) : il attache l'APK à la
# dernière release. Pour un déclenchement 100% auto, donner un PAT à
# release-please (secrets) afin que l'event `release` cascade.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag de release auquel attacher l'APK (défaut : dernière release)"
        required: false
        type: string

jobs:
  build:
    name: Build Android APK (debug-signed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Assemble APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: dual-android-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then TAG="$(gh release view --json tagName -q .tagName)"; fi
          echo "Attaching APK to release $TAG"
          gh release upload "$TAG" android/app/build/outputs/apk/debug/*.apk --clobber
