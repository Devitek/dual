name: Release Please

# Versioning automatique + changelog + GitHub Release à partir des
# Conventional Commits (feat: / fix: / feat!: ...). release-please ouvre une
# "release PR" ; à sa fusion sur main, il crée le tag + la release + le CHANGELOG,
# et synchronise la version dans package.json et app.json.
#
# TOKEN : on utilise RELEASE_PLEASE_TOKEN (PAT fine-grained ou GitHub App). Deux
# effets clés :
#   1. la "release PR" DÉCLENCHE la CI normalement (compatible main protégé) ;
#   2. la GitHub Release est créée par une identité PAT → l'event `release`
#      CASCADE et déclenche le build de l'AAB signé (.github/workflows/
#      release-android.yml) + l'upload Play. AUCUNE étape manuelle.
# Fallback sur le GITHUB_TOKEN si le secret n'est pas défini (le build auto ne
# se déclenchera alors pas : lancer release-android.yml manuellement).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
