name: Release (Play Store)

# Build d'un AAB SIGNÉ (upload key), attaché à la GitHub Release, + upload Play.
# 100% gratuit (build GitHub Actions, pas d'EAS).
#
# Déclenchement :
#   - release (published) : AUTO. release-please crée la release via le PAT
#     RELEASE_PLEASE_TOKEN → l'event `release` cascade → build AAB signé +
#     upload auto sur le canal INTERNE de Play (draft). C'est le chemin nominal.
#     (Découplé du job release-please : même si son nettoyage de labels échoue,
#      la release existe et cet event se déclenche quand même.)
#   - workflow_dispatch : MANUEL (rebuild / upload ponctuel), upload Play optionnel.
#
# versionCode = `git rev-list --count HEAD` : MONOTONE et INDÉPENDANT du workflow
#   (évite tout rejet Play « versionCode doit être supérieur »). fetch-depth: 0.
# versionName = tag sans le « v ».
#
# Secrets : ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
# ANDROID_KEY_PASSWORD (+ PLAY_SERVICE_ACCOUNT_JSON pour l'upload).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_play:
        description: "Envoyer aussi sur Google Play"
        type: boolean
        default: false
      track:
        description: "Piste Play (si upload)"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal
      release_status:
        description: "Statut de la release Play (si upload)"
        type: choice
        options: [draft, completed]
        default: draft

concurrency:
  group: release-android-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build signed AAB (+ optional Play upload)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Historique complet requis pour `git rev-list --count HEAD` (versionCode).
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install JS dependencies
        run: npm ci

      - name: Resolve version (name from tag, code from commit count)
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="${RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            TAG="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          fi
          NAME="$(echo "$TAG" | sed 's/^v//')"
          CODE="$(git rev-list --count HEAD)"
          {
            echo "tag=${TAG}"
            echo "name=${NAME:-1.0.0}"
            echo "code=${CODE}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=${NAME:-1.0.0} versionCode=${CODE} (tag=${TAG:-none})"

      # IMPÉRATIF : le versionCode doit être posé dans app.json AVANT `expo
      # prebuild`, car prebuild le fige dans android/app/build.gradle. Le flag
      # Gradle `-Pandroid.injected.version.code` est IGNORÉ par le build RN/Expo
      # (l'AAB repartait sinon sur versionCode 1 -> rejet Play « déjà utilisé »).
      - name: Set versionCode / versionName in app.json (before prebuild)
        env:
          APP_VERSION_NAME: ${{ steps.ver.outputs.name }}
          APP_VERSION_CODE: ${{ steps.ver.outputs.code }}
        run: |
          node -e '
            const fs = require("fs");
            const p = "app.json";
            const a = JSON.parse(fs.readFileSync(p, "utf8"));
            a.expo.version = process.env.APP_VERSION_NAME;
            a.expo.android = a.expo.android || {};
            a.expo.android.versionCode = Number(process.env.APP_VERSION_CODE);
            fs.writeFileSync(p, JSON.stringify(a, null, 2) + "\n");
            console.log("app.json -> version " + a.expo.version + " / versionCode " + a.expo.android.versionCode);
          '

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Build signed AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/upload.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Name the AAB
        id: aab
        run: |
          SRC=android/app/build/outputs/bundle/release/app-release.aab
          VER="${{ steps.ver.outputs.tag }}"
          [ -z "$VER" ] && VER="r${{ steps.ver.outputs.code }}"
          OUT="TwinLens-${VER}.aab"
          cp "$SRC" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Attach AAB to the GitHub release
        if: steps.ver.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.ver.outputs.tag }}" "${{ steps.aab.outputs.path }}" --clobber

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: twinlens-aab
          path: ${{ steps.aab.outputs.path }}
          if-no-files-found: error

      # Upload Play : AUTO sur l'event release → canal interne, DÉPLOYÉ
      # (release_status=completed : l'interne ne passe pas par l'examen Google,
      # les testeurs reçoivent la maj sans action manuelle). En manuel
      # (workflow_dispatch), le défaut reste `draft` (ou le choix de l'input).
      - name: Write Play service account key
        if: ${{ github.event_name == 'release' || inputs.upload_to_play }}
        run: printf '%s' '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/play.json"

      - name: Upload to Google Play (Fastlane supply)
        if: ${{ github.event_name == 'release' || inputs.upload_to_play }}
        env:
          AAB_PATH: ${{ steps.aab.outputs.path }}
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/play.json
          SUPPLY_TRACK: ${{ inputs.track || 'internal' }}
          SUPPLY_RELEASE_STATUS: ${{ github.event_name == 'release' && 'completed' || inputs.release_status || 'draft' }}
        run: bundle exec fastlane android internal
