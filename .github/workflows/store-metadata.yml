name: Store Metadata (Play listing)

# Pousse la FICHE Play (titres, descriptions, icône, feature graphic, captures
# téléphone + 7"/10") via l'API Google Play Developer brute
# (store/upload_listing.py). Manuel. Ne touche NI aux binaires NI aux notes de
# version (celles-ci sont poussées avec l'AAB par release-android.yml).
#
# Secret requis : PLAY_SERVICE_ACCOUNT_JSON.
# Pré-requis : app créée dans la Play Console + le compte de service a le rôle
# IAM "Service Usage Consumer" sur le projet Google Cloud (sinon 403 quota).

on:
  workflow_dispatch:

concurrency:
  group: store-metadata
  cancel-in-progress: false

jobs:
  metadata:
    name: Upload Play listing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet google-auth requests

      - name: Write Play service account key
        run: printf '%s' '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/play.json"

      - name: Upload listing (raw Play Developer API)
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/play.json
        run: python3 store/upload_listing.py
