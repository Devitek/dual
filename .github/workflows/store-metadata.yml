name: Store Metadata (Play listing)

# Pousse la FICHE Play (titres, descriptions, notes de version, icône, feature
# graphic, captures) via Fastlane `supply`, SANS binaire. Manuel.
#
# Secret requis : PLAY_SERVICE_ACCOUNT_JSON (cf. RELEASE.md).
# Pré-requis : l'app doit exister dans la Play Console (1er AAB déjà déposé).

on:
  workflow_dispatch:

concurrency:
  group: store-metadata
  cancel-in-progress: false

jobs:
  metadata:
    name: Upload Play listing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Write Play service account key
        run: printf '%s' '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/play.json"

      - name: Diagnostic — identité du compte de service (pas de secret loggé)
        run: |
          python3 - "$RUNNER_TEMP/play.json" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          print("client_email :", d.get("client_email"))
          print("project_id   :", d.get("project_id"))
          print("type         :", d.get("type"))
          print("private_key  :", "present" if d.get("private_key") else "MISSING")
          PY

      - name: Diagnostic — séquence supply (insert/listing/tracks/details)
        continue-on-error: true
        run: |
          pip install --quiet google-auth requests
          python3 - "$RUNNER_TEMP/play.json" <<'PY'
          import sys, json, requests
          from google.oauth2 import service_account
          import google.auth.transport.requests as gr
          creds = service_account.Credentials.from_service_account_file(
              sys.argv[1], scopes=["https://www.googleapis.com/auth/androidpublisher"])
          creds.refresh(gr.Request())
          H = {"Authorization": f"Bearer {creds.token}"}
          pkg = "fr.devitek.twinlens"
          base = f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}"
          r = requests.post(f"{base}/edits", headers=H)
          print("edits.insert       :", r.status_code, r.text[:200])
          eid = r.json().get("id") if r.ok else None
          if eid:
              r2 = requests.get(f"{base}/edits/{eid}/details", headers=H)
              print("details.get        :", r2.status_code, r2.text[:200])
              r3 = requests.get(f"{base}/edits/{eid}/tracks", headers=H)
              print("tracks.list        :", r3.status_code, r3.text[:200])
              r4 = requests.get(f"{base}/edits/{eid}/listings", headers=H)
              print("listings.list      :", r4.status_code, r4.text[:200])
              body = {"language":"fr-FR","title":"probe","shortDescription":"probe","fullDescription":"probe"}
              r5 = requests.put(f"{base}/edits/{eid}/listings/fr-FR",
                                headers={**H,"Content-Type":"application/json"}, data=json.dumps(body))
              print("listings.update FR :", r5.status_code, r5.text[:300])
              r6 = requests.delete(f"{base}/edits/{eid}", headers=H)  # abandonne l'edit (aucune modif publiée)
              print("edits.delete       :", r6.status_code)
          PY

      - name: Upload listing (Fastlane supply — metadata only)
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/play.json
        run: bundle exec fastlane android metadata --verbose
