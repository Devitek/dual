name: Store Metadata (Play listing)

# Pousse la FICHE Play (titres, descriptions, notes de version, icône, feature
# graphic, captures) via Fastlane `supply`, SANS binaire. Manuel.
#
# Secret requis : PLAY_SERVICE_ACCOUNT_JSON (cf. RELEASE.md).
# Pré-requis : l'app doit exister dans la Play Console (1er AAB déjà déposé).

on:
  workflow_dispatch:

concurrency:
  group: store-metadata
  cancel-in-progress: false

jobs:
  metadata:
    name: Upload Play listing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Write Play service account key
        run: printf '%s' '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/play.json"

      - name: Diagnostic — identité du compte de service (pas de secret loggé)
        run: |
          python3 - "$RUNNER_TEMP/play.json" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          print("client_email :", d.get("client_email"))
          print("project_id   :", d.get("project_id"))
          print("type         :", d.get("type"))
          print("private_key  :", "present" if d.get("private_key") else "MISSING")
          PY

      # Les notes de version s'attachent à une release (versionCode), pas à la
      # fiche. supply tente quand même de les traiter si les fichiers sont là
      # (malgré skip_upload_changelogs) -> on les retire de la copie CI. Ils
      # restent versionnés pour le lane `internal` qui les pousse avec l'AAB.
      - name: Écarter les changelogs de la copie CI
        run: rm -rf fastlane/metadata/android/*/changelogs

      - name: Upload listing (Fastlane supply — metadata only)
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/play.json
        run: bundle exec fastlane android metadata
