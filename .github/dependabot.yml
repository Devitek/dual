version: 2

updates:
  # Dépendances npm
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # Regroupe les mises à jour liées pour réduire le bruit
    groups:
      expo:
        patterns: ["expo", "expo-*", "@expo/*", "babel-preset-expo"]
      react-native:
        patterns: ["react-native", "@react-native/*", "react-native-*"]
      dev-dependencies:
        dependency-type: development
    # Ces versions sont pilotées par le SDK Expo (via `expo install`) :
    # on évite les bumps aveugles qui cassent la compat (voir historique).
    ignore:
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"

  # Actions GitHub des workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "github-actions"]
